name: 🚀 Deploy to Google Cloud Platform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      services:
        description: 'Services to deploy (comma-separated or "all")'
        required: false
        default: "all"
        type: string

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: app

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 🔍 АНАЛИЗ И ТЕСТИРОВАНИЕ
  # ═══════════════════════════════════════════════════════════════════════════
  analyze:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest
    outputs:
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      backend-changed: ${{ steps.changes.outputs.backend }}
      ai-engine-changed: ${{ steps.changes.outputs.ai-engine }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔎 Detect Changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            ai-engine:
              - 'ai-engine/**'

      - name: 📊 Summary
        run: |
          {
            echo "### 📊 Change Detection Summary"
            echo ""
            echo "| Service | Changed |"
            echo "|---------|---------|"
            echo "| Frontend | ${{ steps.changes.outputs.frontend }} |"
            echo "| Backend | ${{ steps.changes.outputs.backend }} |"
            echo "| AI Engine | ${{ steps.changes.outputs.ai-engine }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # 🎨 FRONTEND
  # ═══════════════════════════════════════════════════════════════════════════
  frontend:
    name: 🎨 Frontend
    runs-on: ubuntu-latest
    needs: analyze
    if: |
      needs.analyze.outputs.frontend-changed == 'true' ||
      github.event.inputs.services == 'all' ||
      contains(github.event.inputs.services, 'frontend')
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: 🔍 Lint Frontend
        working-directory: frontend
        run: npm run lint || echo "Lint warnings, continuing..."

      - name: 🏗️ Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: ✅ Validate GCP Credentials
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.GCP_CREDENTIALS }}" ]; then
            echo "::error::GCP_CREDENTIALS secret is not set or is empty!"
            echo "::error::Please configure the GCP_CREDENTIALS secret at:"
            echo "::error::https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "::error::The secret should contain a JSON service account key from Google Cloud Platform."
            exit 1
          fi
          echo "✅ GCP_CREDENTIALS secret is configured"

      - name: 🔐 Authenticate to GCP
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: ☁️ Setup Cloud SDK
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: 🐳 Configure Docker
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: 🏗️ Build & Push Docker Image
        if: github.event_name != 'pull_request'
        working-directory: frontend
        run: |
          REGISTRY="${{ env.ARTIFACT_REGISTRY }}"
          PROJECT="${{ env.PROJECT_ID }}"
          REPO="${{ env.REPOSITORY }}"
          TAG="${{ github.sha }}"
          IMAGE="${REGISTRY}/${PROJECT}/${REPO}/frontend:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: 🚀 Deploy to Cloud Run
        if: github.event_name != 'pull_request'
        run: |
          gcloud run deploy codementor-frontend \
            --image="${{ env.IMAGE }}" \
            --region="${{ env.REGION }}" \
            --quiet

      - name: 📋 Output URL
        if: github.event_name != 'pull_request'
        run: |
          URL=$(gcloud run services describe codementor-frontend \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          {
            echo "### 🎨 Frontend Deployed"
            echo "URL: $URL"
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # ⚙️ BACKEND
  # ═══════════════════════════════════════════════════════════════════════════
  backend:
    name: ⚙️ Backend
    runs-on: ubuntu-latest
    needs: [analyze, ai-engine]
    if: |
      always() &&
      (needs.ai-engine.result == 'success' || needs.ai-engine.result == 'skipped') &&
      (needs.analyze.outputs.backend-changed == 'true' ||
      github.event.inputs.services == 'all' ||
      contains(github.event.inputs.services, 'backend'))
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: backend
        run: npm ci

      - name: 🧪 Run Tests
        working-directory: backend
        run: npm test --if-present
        continue-on-error: true

      - name: ✅ Validate GCP Credentials
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.GCP_CREDENTIALS }}" ]; then
            echo "::error::GCP_CREDENTIALS secret is not set or is empty!"
            echo "::error::Please configure the GCP_CREDENTIALS secret at:"
            echo "::error::https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "::error::The secret should contain a JSON service account key from Google Cloud Platform."
            exit 1
          fi
          echo "✅ GCP_CREDENTIALS secret is configured"

      - name: 🔐 Authenticate to GCP
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: ☁️ Setup Cloud SDK
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: 🐳 Configure Docker
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: 🏗️ Build & Push Docker Image
        if: github.event_name != 'pull_request'
        working-directory: backend
        run: |
          REGISTRY="${{ env.ARTIFACT_REGISTRY }}"
          PROJECT="${{ env.PROJECT_ID }}"
          REPO="${{ env.REPOSITORY }}"
          TAG="${{ github.sha }}"
          IMAGE="${REGISTRY}/${PROJECT}/${REPO}/backend:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: 🔗 Get AI Engine URL
        if: github.event_name != 'pull_request'
        run: |
          AI_ENGINE_URL=$(gcloud run services describe codementor-ai-engine \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          if [ -z "${AI_ENGINE_URL}" ]; then
            echo "::error::Failed to retrieve AI Engine URL. Ensure codementor-ai-engine is deployed in region ${{ env.REGION }}."
            exit 1
          fi
          echo "AI_ENGINE_URL=${AI_ENGINE_URL}" >> "$GITHUB_ENV"

      - name: 🚀 Deploy to Cloud Run
        if: github.event_name != 'pull_request'
        run: |
          gcloud run deploy codementor-backend \
            --image="${{ env.IMAGE }}" \
            --region="${{ env.REGION }}" \
            --set-env-vars="PYTHON_AI_ENGINE_URL=${AI_ENGINE_URL}" \
            --quiet

      - name: 📋 Output URL
        if: github.event_name != 'pull_request'
        run: |
          URL=$(gcloud run services describe codementor-backend \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          {
            echo "### ⚙️ Backend Deployed"
            echo "URL: $URL"
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # 🤖 AI ENGINE
  # ═══════════════════════════════════════════════════════════════════════════
  ai-engine:
    name: 🤖 AI Engine
    runs-on: ubuntu-latest
    needs: analyze
    if: |
      needs.analyze.outputs.ai-engine-changed == 'true' ||
      github.event.inputs.services == 'all' ||
      contains(github.event.inputs.services, 'ai-engine')
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-engine/requirements.txt

      - name: 📦 Install Dependencies
        working-directory: ai-engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run Tests
        working-directory: ai-engine
        run: |
          pip install pytest pytest-cov
          pytest --cov=. --cov-report=xml || echo "Tests completed"
        continue-on-error: true

      - name: ✅ Validate GCP Credentials
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.GCP_CREDENTIALS }}" ]; then
            echo "::error::GCP_CREDENTIALS secret is not set or is empty!"
            echo "::error::Please configure the GCP_CREDENTIALS secret at:"
            echo "::error::https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "::error::The secret should contain a JSON service account key from Google Cloud Platform."
            exit 1
          fi
          echo "✅ GCP_CREDENTIALS secret is configured"

      - name: 🔐 Authenticate to GCP
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: ☁️ Setup Cloud SDK
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: 🐳 Configure Docker
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: 🏗️ Build & Push Docker Image
        if: github.event_name != 'pull_request'
        working-directory: ai-engine
        run: |
          REGISTRY="${{ env.ARTIFACT_REGISTRY }}"
          PROJECT="${{ env.PROJECT_ID }}"
          REPO="${{ env.REPOSITORY }}"
          TAG="${{ github.sha }}"
          IMAGE="${REGISTRY}/${PROJECT}/${REPO}/ai-engine:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: 🚀 Deploy to Cloud Run
        if: github.event_name != 'pull_request'
        run: |
          gcloud run deploy codementor-ai-engine \
            --image="${{ env.IMAGE }}" \
            --region="${{ env.REGION }}" \
            --quiet

      - name: 📋 Output URL
        if: github.event_name != 'pull_request'
        run: |
          URL=$(gcloud run services describe codementor-ai-engine \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          {
            echo "### 🤖 AI Engine Deployed"
            echo "URL: $URL"
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # 📊 DEPLOYMENT SUMMARY
  # ═══════════════════════════════════════════════════════════════════════════
  summary:
    name: 📊 Deployment Summary
    runs-on: ubuntu-latest
    needs: [frontend, backend, ai-engine]
    if: always() && github.event_name != 'pull_request'
    steps:
      - name: ✅ Validate GCP Credentials
        run: |
          if [ -z "${{ secrets.GCP_CREDENTIALS }}" ]; then
            echo "::error::GCP_CREDENTIALS secret is not set or is empty!"
            echo "::error::Please configure the GCP_CREDENTIALS secret at:"
            echo "::error::https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "::error::The secret should contain a JSON service account key from Google Cloud Platform."
            exit 1
          fi
          echo "✅ GCP_CREDENTIALS secret is configured"

      - name: 🔐 Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: ☁️ Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: 📊 Generate Summary
        run: |
          REGION="${{ env.REGION }}"
          FRONTEND_URL=$(gcloud run services describe \
            codementor-frontend \
            --region="${REGION}" \
            --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          BACKEND_URL=$(gcloud run services describe \
            codementor-backend \
            --region="${REGION}" \
            --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          AI_URL=$(gcloud run services describe \
            codementor-ai-engine \
            --region="${REGION}" \
            --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          {
            echo "# 🚀 CodeMentor AI Platform - Deployment Complete"
            echo ""
            echo "## 📍 Service URLs"
            echo ""
            echo "| Service | URL |"
            echo "|---------|-----|"
            echo "| 🎨 Frontend | ${FRONTEND_URL} |"
            echo "| ⚙️ Backend | ${BACKEND_URL} |"
            echo "| 🤖 AI Engine | ${AI_URL} |"
            echo ""
            echo "## 📈 Deployment Info"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
            echo "- **Triggered by:** @${{ github.actor }}"
            echo "- **Region:** ${REGION}"
          } >> "$GITHUB_STEP_SUMMARY"
